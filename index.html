<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Unsolved — a world map of genuinely unresolved historical mysteries, presented as an honest research archive."
    />
    <title>Unsolved — The Last Mysteries Map</title>

    <!-- Fonts: Cormorant Garamond (serif display), Inter (body), JetBrains Mono
         (case-file metadata). Substitutes for the licensed Copernicus/StyreneB,
         per design.md "Known Gaps". -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Set the theme class before first paint to avoid a flash of the wrong
         theme. Reads a saved choice, falling back to the OS preference. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('unsolved-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          /* localStorage unavailable (private mode) — default to light. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
